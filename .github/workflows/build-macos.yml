  name: 打包 macOS 版本

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build-macos:
      runs-on: macos-latest

      steps:
        - name: 检出代码
          uses: actions/checkout@v4

        - name: 安装 Rosetta 2 和 x86_64 Python
          run: |
            softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
            curl -fsSL https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg -o python.pkg
            sudo installer -pkg python.pkg -target /

        - name: 安装依赖
          run: |
            /usr/local/bin/python3 -m pip install pyinstaller PyQt5

        - name: PyInstaller 打包
          run: |
            /usr/local/bin/python3 -m PyInstaller \
              --onefile \
              --windowed \
              --name "桌宠" \
              --hidden-import PyQt5.QtCore \
              --hidden-import PyQt5.QtGui \
              --hidden-import PyQt5.QtWidgets \
              --osx-bundle-identifier com.zhuochong.pet \
              --target-arch x86_64 \
              pet.py

        - name: 创建 DMG
          run: |
            mkdir -p dmg_contents
            cp -R dist/桌宠.app dmg_contents/
            ln -s /Applications dmg_contents/Applications
            hdiutil create \
              -volname "桌宠" \
              -srcfolder dmg_contents \
              -ov \
              -format UDZO \
              桌宠-macOS.dmg

        - name: 上传
          uses: actions/upload-artifact@v4
          with:
            name: 桌宠-macOS
            path: 桌宠-macOS.dmg
            retention-days: 90
